<!DOCTYPE html>
<html>
<head>
    <title>Amazon Product Search</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
</head>
<body>

    <h2>Amazon ပစ္စည်းများရှာဖွေရန်</h2>
    <input type="text" id="searchInput" placeholder="ပစ္စည်းနာမည် ရိုက်ထည့်ပါ..." onkeyup="filterProducts()">
    <div id="productDisplay"></div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTRWv5GgKpvnXuuNUJ2DSDJ6_Zc-I-IWmIsMOoQtVsyvw7fKDxOdLdw79sdVOeGYdBr8OkyF1tG0yC/pub?gid=101546465&single=true&output=csv';

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            complete: function(results) {
                console.log("Data:", results.data); // ဒီစာကြောင်းက ဘာ error တက်လဲ သိအောင်ကူညီပေးပါမယ်
                window.allProducts = results.data;
                renderTable(window.allProducts);
            }
        });

        function renderTable(data) {
            let html = "<table border='1'><tr><th>Title</th><th>Price</th></tr>";
            data.forEach(item => {
                // ဒီနေရာမှာ title, price နာမည်အမှန်ကို ယူသုံးပါ
                let name = item.title || "No Title";
                let price = item.price || "0";
                html += <tr><td>${name}</td><td>${price}</td></tr>;
            });
            html += "</table>";
            document.getElementById('productDisplay').innerHTML = html;
        }

        function filterProducts() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let filtered = window.allProducts.filter(item => 
                item.title && item.title.toLowerCase().includes(input)
            );
            renderTable(filtered);
        }
    </script>
</body>
</html>
